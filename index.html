<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAIEX K-Means Clustering Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;

        .nav-link {

        .nav-link:hover {

        header {

            width: 100%;

        .loader {
            border: 4px solid #f3f3f3;

            border-radius: 50%;

            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <a href="https://jacky41788888.github.io/web/" class="nav-link">&larr; 返回首頁</a>

    <header>
        <h1>TAIEX 市場位階與恐慌指標分析</h1>
        <p>基於 K-Means 機器學習與恐慌向量 (Panic Vector) 投影之自動分析系統</p>
        <div style="margin-top: 15px;">
            <img src="https://hits.sh/jacky41788888.github.io/web/taiex.svg?style=for-the-badge&label=瀏覽次數&color=38bdf8&labelColor=1e293b" alt="網頁瀏覽計數">
        </div>
    </header>

    <div class="status-card" id="statusBox">
        <div class="loader" id="loader"></div>
        <span id="statusText">正在處理全歷史數據並進行機器學習與向量投影運算，請稍候...</span>
    </div>

    <div class="input-panel">
        <label for="inputDate">日期：</label>
        <input type="date" id="inputDate">
        
        <label for="inputClose">指數價格：</label>
        <input type="number" id="inputClose" placeholder="例如：23000">
        
        <label for="inputVolume">成交量 (億)：</label>
        <input type="number" id="inputVolume" placeholder="例如：4000">
        
        <button onclick="addCustomData()">加入數據並重新分析</button>
    </div>

    <div id="chart"></div>
</div>

<script>
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('inputDate').value = `${yyyy}-${mm}-${dd}`;
    
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRv5-oA8DNbp3N-TlBwmdG63ZBqdzw1wBJZiAy9x-T6eNIec-dzoGvF4gP2rnn25eIEs_kodTDnORTC/pub?output=csv';
    let globalRawData = []; 

    function calculateMA(data, period) {
        let ma = new Array(data.length).fill(null);
        for (let i = period - 1; i < data.length; i++) {
            let sum = 0;
            for (let j = 0; j < period; j++) sum += data[i - j];
            ma[i] = sum / period;
        }
        return ma;
    }

    function calculateVolatility(data, period) {
        let vol = new Array(data.length).fill(null);
        for (let i = period; i < data.length; i++) {
            let returns = [];
            for (let j = 0; j < period; j++) {
                returns.push((data[i-j] - data[i-j-1]) / data[i-j-1]);
            }
            let mean = returns.reduce((a, b) => a + b) / period;
            let sqDiff = returns.map(r => Math.pow(r - mean, 2));
            vol[i] = Math.sqrt(sqDiff.reduce((a, b) => a + b) / period);
        }
        return vol;
    }

    function standardize(features) {
        const n = features.length;
        const m = features[0].length;
        let standardized = Array.from({length: n}, () => []);

        for (let j = 0; j < m; j++) {
            let col = features.map(row => row[j]);
            let avg = col.reduce((a, b) => a + b) / n;
            let std = Math.sqrt(col.map(x => Math.pow(x - avg, 2)).reduce((a, b) => a + b) / n);
            if (std === 0 || isNaN(std)) std = 1; 
            for (let i = 0; i < n; i++) {
                standardized[i][j] = (features[i][j] - avg) / std;
            }
        }
        return standardized;
    }

    function seededRandom(seed) {
        return function() {
            seed |= 0; seed = seed + 0x6D2B79F5 | 0;
            let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    function runKMeans(data, k, maxIter = 100, n_init = 10, random_state = 42) {
        let bestClusters = null;
        let lowestInertia = Infinity;

        for (let init = 0; init < n_init; init++) {
            let rng = seededRandom(random_state + init);
            let centroids = [];
            let indices = new Set();
            
            while (centroids.length < k && indices.size < data.length) {
                let idx = Math.floor(rng() * data.length);
                if (!indices.has(idx)) {
                    indices.add(idx);
                    centroids.push([...data[idx]]);
                }
            }
            
            let clusters = new Array(data.length).fill(0);
            
            for (let iter = 0; iter < maxIter; iter++) {
                let changed = false;
                for (let i = 0; i < data.length; i++) {
                    let minDist = Infinity;
                    let minIdx = 0;
                    for (let j = 0; j < k; j++) {
                        let dist = 0;
                        for (let d = 0; d < data[0].length; d++) {
                            dist += Math.pow(data[i][d] - centroids[j][d], 2);
                        }
                        if (dist < minDist) {
                            minDist = dist;
                            minIdx = j;
                        }
                    }
                    if (clusters[i] !== minIdx) {
                        clusters[i] = minIdx;
                        changed = true;
                    }
                }
                if (!changed) break;
                
                let sums = Array.from({length: k}, () => new Array(data[0].length).fill(0));
                let counts = new Array(k).fill(0);
                for (let i = 0; i < data.length; i++) {
                    let c = clusters[i];
                    counts[c]++;
                    for (let d = 0; d < data[0].length; d++) {
                        sums[c][d] += data[i][d];
                    }
                }
                for (let j = 0; j < k; j++) {
                    if (counts[j] > 0) {
                        for (let d = 0; d < data[0].length; d++) {
                            centroids[j][d] = sums[j][d] / counts[j];
                        }
                    }
                }
            }

            let currentInertia = 0;
            for (let i = 0; i < data.length; i++) {
                let c = clusters[i];
                for (let d = 0; d < data[0].length; d++) {
                    currentInertia += Math.pow(data[i][d] - centroids[c][d], 2);
                }
            }

            if (currentInertia < lowestInertia) {
                lowestInertia = currentInertia;
                bestClusters = [...clusters];
            }
        }
        
        return bestClusters;
    }

    function processDataAndPlot(rawData) {
        try {
            document.getElementById('loader').style.display = 'inline-block';
            document.getElementById('statusText').innerText = "正在進行機器學習運算與恐慌向量投影計算...";
            
            let df = [...rawData];
            df.sort((a, b) => new Date(a.date) - new Date(b.date));

            const close = df.map(r => parseFloat(String(r.close).replace(/,/g, '')));
            const volume = df.map(r => {
                let val = (r.trading_money !== undefined && r.trading_money !== '') ? r.trading_money : r.trading_volume;
                return parseFloat(String(val).replace(/,/g, ''));
            });
            
            const ma5 = calculateMA(close, 5);
            const ma10 = calculateMA(close, 10);
            const ma20 = calculateMA(close, 20);
            const ma60 = calculateMA(close, 60);
            const ma120 = calculateMA(close, 120);
            
            const volMa10 = calculateMA(volume, 10);
            const volMa20 = calculateMA(volume, 20);
            
            const bias10 = close.map((v, i) => ma10[i] ? (v - ma10[i]) / ma10[i] : null);
            const bias20 = close.map((v, i) => ma20[i] ? (v - ma20[i]) / ma20[i] : null);
            const vol10 = calculateVolatility(close, 10);
            const vol20 = calculateVolatility(close, 20);
            const ratio10 = volume.map((v, i) => volMa10[i] ? v / volMa10[i] : null);
            const ratio20 = volume.map((v, i) => volMa20[i] ? v / volMa20[i] : null);

            let finalDf = [];
            let X = [];
            for (let i = 0; i < df.length; i++) {
                if (bias20[i] !== null && !isNaN(bias20[i]) && !isNaN(vol20[i]) && !isNaN(ratio20[i])) {
                    const feat = [bias10[i], bias20[i], vol10[i], vol20[i], ratio10[i], ratio20[i]];
                    X.push(feat);
                    finalDf.push({
                        ...df[i], 
                        close: close[i], 
                        ma5: ma5[i],
                        ma10: ma10[i],
                        ma20: ma20[i],
                        ma60: ma60[i],
                        ma120: ma120[i],
                        feat: feat
                    });
                }
            }

            if (X.length < 5) throw new Error("有效數據不足，無法執行 K-Means 分析。");

            const scaledX = standardize(X);
            const allClusters = runKMeans(scaledX, 5); 
            
            let clusterStats = [0,1,2,3,4].map(c => {
                let subset = X.filter((_, i) => allClusters[i] === c);
                let avgBias = subset.length > 0 ? subset.reduce((a, b) => a + b[1], 0) / subset.length : -999;
                return { id: c, avgBias: avgBias };
            }).sort((a, b) => b.avgBias - a.avgBias);

            const regimeMap = {
                [clusterStats[0].id]: { name: 'Extreme_Sell', color: '#008000' },
                [clusterStats[1].id]: { name: 'Sell_Zone', color: '#90EE90' },
                [clusterStats[2].id]: { name: 'Wait_Zone', color: '#A6A6A6' },
                [clusterStats[3].id]: { name: 'Buy_Zone', color: '#FFB6C1' },
                [clusterStats[4].id]: { name: 'Extreme_Buy', color: '#FF0000' }
            };

            // 計算 C_normal 與 C_panic
            const normalCid = clusterStats[2].id;
            const panicCid = clusterStats[4].id;

            let cNormal = new Array(6).fill(0);
            let cPanic = new Array(6).fill(0);
            let countNormal = 0, countPanic = 0;

            for (let i = 0; i < scaledX.length; i++) {
                if (allClusters[i] === normalCid) {
                    for (let d = 0; d < 6; d++) cNormal[d] += scaledX[i][d];
                    countNormal++;
                } else if (allClusters[i] === panicCid) {
                    for (let d = 0; d < 6; d++) cPanic[d] += scaledX[i][d];
                    countPanic++;
                }
            }
            if (countNormal > 0) cNormal = cNormal.map(v => v / countNormal);
            if (countPanic > 0) cPanic = cPanic.map(v => v / countPanic);

            let vPanic = new Array(6);
            let vPanicNormSq = 0;
            for (let d = 0; d < 6; d++) {
                vPanic[d] = cPanic[d] - cNormal[d];
                vPanicNormSq += vPanic[d] * vPanic[d];
            }
            let vPanicNorm = Math.sqrt(vPanicNormSq);
            let vPanicUnit = vPanic.map(v => vPanicNorm > 0 ? v / vPanicNorm : 0);

            for (let i = 0; i < finalDf.length; i++) {
                let score = 0;
                for (let d = 0; d < 6; d++) {
                    score += (scaledX[i][d] - cNormal[d]) * vPanicUnit[d];
                }
                finalDf[i].panicScore = score;
            }

            const plotData = finalDf;
            const plotClusters = allClusters;
            const allDates = plotData.map(d => d.date); // 完整時間順序陣列

            let traces = [];

            // 1. 先加入完整歷史的指數主線 (確保時間軸優先註冊)
            traces.push({
                x: allDates, y: plotData.map(d => d.close),
                mode: 'lines', name: 'TAIEX Close', line: { color: 'rgba(255,255,255,0.2)', width: 1 }, hoverinfo: 'skip', xaxis: 'x', yaxis: 'y'
            });

            // 2. 加入均線 Traces
            traces.push({
                x: allDates, y: plotData.map(d => d.ma5),
                mode: 'lines', name: '5MA', line: { color: '#f59e0b', width: 1.2 }, visible: 'legendonly', hoverinfo: 'skip', xaxis: 'x', yaxis: 'y'
            });
            traces.push({
                x: allDates, y: plotData.map(d => d.ma10),
                mode: 'lines', name: '10MA', line: { color: '#84cc16', width: 1.2 }, visible: 'legendonly', hoverinfo: 'skip', xaxis: 'x', yaxis: 'y'
            });
            traces.push({
                x: allDates, y: plotData.map(d => d.ma20),
                mode: 'lines', name: '20MA', line: { color: '#a855f7', width: 1.2 }, visible: true, hoverinfo: 'skip', xaxis: 'x', yaxis: 'y'
            });
            traces.push({
                x: allDates, y: plotData.map(d => d.ma60),
                mode: 'lines', name: '60MA', line: { color: '#ffffff', width: 1.2 }, visible: true, hoverinfo: 'skip', xaxis: 'x', yaxis: 'y'
            });
            traces.push({
                x: allDates, y: plotData.map(d => d.ma120),
                mode: 'lines', name: '120MA', line: { color: '#ff1493', width: 1.2 }, visible: true, hoverinfo: 'skip', xaxis: 'x', yaxis: 'y'
            });

            // 3. 加入 K-Means 買賣位階分群散點圖
            Object.keys(regimeMap).forEach(cid => {
                let subset = plotData.filter((_, i) => plotClusters[i] == cid);
                traces.push({
                    x: subset.map(d => d.date),
                    y: subset.map(d => d.close),
                    customdata: subset.map(d => {
                        let vol = (d.trading_money !== undefined && d.trading_money !== '') ? d.trading_money : d.trading_volume;
                        return parseFloat(String(vol).replace(/,/g, '')).toLocaleString();
                    }),
                    mode: 'markers',
                    name: regimeMap[cid].name,
                    xaxis: 'x',
                    yaxis: 'y',
                    marker: { color: regimeMap[cid].color, size: 6 },
                    hovertemplate: '日期: %{x}<br>指數: %{y:,.0f}<br>成交量: %{customdata}<extra></extra>' 
                });
            });

            // 4. 底部恐慌得分柱狀圖
            traces.push({
                x: allDates,
                y: plotData.map(d => d.panicScore),
                type: 'bar',
                name: '恐慌得分 (Panic Score)',
                xaxis: 'x',
                yaxis: 'y2',
                marker: {
                    color: plotData.map(d => d.panicScore > 1.0 ? '#ef4444' : (d.panicScore > 0 ? '#f97316' : '#38bdf8'))
                },
                hovertemplate: '日期: %{x}<br>恐慌得分: %{y:.2f}<extra></extra>'
            });

            // 計算近一年數據起始位置
            const latestDateString = plotData[plotData.length - 1].date;
            const latestDate = new Date(latestDateString);
            const oneYearAgo = new Date(latestDate);
            oneYearAgo.setFullYear(latestDate.getFullYear() - 1);

            let startIndex = plotData.findIndex(d => new Date(d.date) >= oneYearAgo);
            if (startIndex === -1) startIndex = 0;
            let endIndex = plotData.length - 1;

            Plotly.newPlot('chart', traces, {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#fff' },
                margin: { t: 50, r: 30, l: 60, b: 50 },
                grid: { rows: 2, columns: 1, roworder: 'top to bottom' },
                xaxis: { 
                    gridcolor: '#334155',
                    type: 'category',
                    categoryorder: 'array',
                    categoryarray: allDates, // 強制指定正確時間順序
                    nticks: 12,
                    range: [startIndex, endIndex + 0.5], 
                    rangeslider: { visible: true, bgcolor: '#0f172a' }
                },
                yaxis: { 
                    title: 'TAIEX 指數', 
                    gridcolor: '#334155',
                    domain: [0.32, 1.0]
                },
                yaxis2: { 
                    title: '恐慌得分', 
                    gridcolor: '#334155',
                    domain: [0.0, 0.22],
                    zerolinecolor: '#475569',
                    zerolinewidth: 1.5
                },
                title: 'TAIEX 市場位階聚類與恐慌向量得分 (連續交易日排列)',
                hovermode: 'closest', 
                hoverlabel: {
                    bgcolor: '#1e293b', 
                    bordercolor: '#38bdf8',
                    font: { color: '#ffffff', size: 14 }
                }
            });

            // 動態 Y 軸範圍校正監聽器
            const chartDiv = document.getElementById('chart');
            chartDiv.on('plotly_relayout', function(eventData) {
                let xRange = eventData['xaxis.range'] || (eventData['xaxis.range[0]'] !== undefined ? [eventData['xaxis.range[0]'], eventData['xaxis.range[1]']] : null);
                
                if (xRange && xRange[0] !== undefined) {
                    let xStart = xRange[0];
                    let xEnd = xRange[1];
                    let startIdx, endIdx;

                    if (typeof xStart === 'number') {
                        startIdx = Math.max(0, Math.floor(xStart));
                        endIdx = Math.min(plotData.length - 1, Math.ceil(xEnd));
                    } else {
                        startIdx = plotData.findIndex(d => d.date === xStart);
                        endIdx = plotData.findIndex(d => d.date === xEnd);
                        if (startIdx === -1) startIdx = 0;
                        if (endIdx === -1) endIdx = plotData.length - 1;
                    }

                    if (startIdx > endIdx) { let tmp = startIdx; startIdx = endIdx; endIdx = tmp; }

                    let minY = Infinity;
                    let maxY = -Infinity;

                    for (let i = startIdx; i <= endIdx; i++) {
                        let d = plotData[i];
                        if (!d) continue;
                        let yValues = [d.close];
                        if (d.ma5 !== null && !isNaN(d.ma5)) yValues.push(d.ma5);
                        if (d.ma10 !== null && !isNaN(d.ma10)) yValues.push(d.ma10);
                        if (d.ma20 !== null && !isNaN(d.ma20)) yValues.push(d.ma20);
                        if (d.ma60 !== null && !isNaN(d.ma60)) yValues.push(d.ma60);
                        if (d.ma120 !== null && !isNaN(d.ma120)) yValues.push(d.ma120);

                        let localMin = Math.min(...yValues);
                        let localMax = Math.max(...yValues);

                        if (localMin < minY) minY = localMin;
                        if (localMax > maxY) maxY = localMax;
                    }

                    if (minY !== Infinity && maxY !== -Infinity) {
                        let padding = (maxY - minY) * 0.05; 
                        if (padding === 0) padding = minY * 0.01; 
                        
                        Plotly.relayout(chartDiv, {
                            'yaxis.range': [minY - padding, maxY + padding]
                        });
                    }
                } 
                else if (eventData['xaxis.autorange'] || eventData['autorange']) {
                    Plotly.relayout(chartDiv, {
                        'yaxis.autorange': true
                    });
                }
            });

            document.getElementById('statusBox').style.borderColor = '#10b981';
            document.getElementById('statusText').innerText = `分析完成：已處理 ${finalDf.length} 筆交易日數據，時間軸排序與均線繪製已修正。`;
            document.getElementById('loader').style.display = 'none';

        } catch (err) {
            document.getElementById('statusText').innerText = "分析出錯: " + err.message;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('statusBox').style.borderColor = '#ef4444';
            console.error(err);
        }
    }

    function addCustomData() {
        const dateInput = document.getElementById('inputDate').value;
        const closeInput = document.getElementById('inputClose').value;
        const rawVolumeInput = document.getElementById('inputVolume').value;

        if (!dateInput || !closeInput || !rawVolumeInput) {
            alert("請完整輸入日期、指數價格與成交量！");
            return;
        }

        const volumeInputInBillion = parseFloat(rawVolumeInput);
        const actualVolume = (volumeInputInBillion/0.95) * 100000000;

        globalRawData = globalRawData.filter(row => row.date !== dateInput);

        globalRawData.push({
            date: dateInput,
            close: parseFloat(closeInput),
            trading_volume: actualVolume, 
            trading_money: actualVolume 
        });

        processDataAndPlot(globalRawData);
    }

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        dynamicTyping: false, 
        complete: function(results) {
            globalRawData = results.data.filter(row => row.date && row.close);
            
            if (globalRawData.length === 0) {
                 document.getElementById('statusText').innerText = "未能從連結讀取到有效的數據，請檢查表單欄位名稱是否正確。";
                 document.getElementById('loader').style.display = 'none';
                 document.getElementById('statusBox').style.borderColor = '#ef4444';
                 return;
            }
            processDataAndPlot(globalRawData);
        },
        error: function(err) {
            document.getElementById('statusText').innerText = "讀取資料失敗，請檢查網路連線或連結權限。";
            document.getElementById('loader').style.display = 'none';
            document.getElementById('statusBox').style.borderColor = '#ef4444';
        }
    });
</script>

</body>
</html>
